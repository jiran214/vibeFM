<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>vibeFM · Now Playing</title>
  <link rel="stylesheet" href="/css/app.css">
  <style>
    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      overflow: hidden;
      color: var(--paper);
      background:
        radial-gradient(circle at 77% 17%, rgba(217, 255, 67, 0.055), transparent 25%),
        #030403;
      font-family: var(--sans);
    }

    button {
      color: inherit;
      font: inherit;
    }

    .stage {
      position: relative;
      width: min(100vw, calc(100vh * 16 / 9));
      aspect-ratio: 16 / 9;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(ellipse at 30% 50%, rgba(217, 255, 67, 0.08), transparent 50%),
        linear-gradient(90deg, transparent 49.95%, rgba(255, 255, 255, 0.025) 50%, transparent 50.05%),
        linear-gradient(rgba(255, 255, 255, 0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.018) 1px, transparent 1px),
        var(--ink);
      background-size: 100% 100%, 100% 100%, 4.7vw 4.7vw, 4.7vw 4.7vw, auto;
      transition: background-color 800ms ease;
    }

    .ambient-field {
      position: absolute;
      inset: -18%;
      z-index: 0;
      pointer-events: none;
      opacity: 0.52;
      background:
        radial-gradient(circle at 26% 52%, rgba(217, 255, 67, 0.14), transparent 24%),
        radial-gradient(circle at 74% 28%, rgba(132, 173, 255, 0.075), transparent 22%),
        radial-gradient(circle at 58% 84%, rgba(255, 187, 92, 0.045), transparent 18%);
      filter: blur(34px) saturate(0.9);
      transform: scale(0.96);
      transition: opacity 900ms ease, transform 1200ms ease, filter 900ms ease;
    }

    .ambient-field::after {
      position: absolute;
      inset: 12%;
      border: 1px solid rgba(217, 255, 67, 0.04);
      border-radius: 50%;
      content: "";
      box-shadow:
        0 0 0 7vw rgba(217, 255, 67, 0.012),
        0 0 0 14vw rgba(217, 255, 67, 0.007);
    }

    .stage.is-playing .ambient-field {
      opacity: 1;
      filter: blur(28px) saturate(1.15);
      transform: scale(1.06);
      animation: ambientDrift 12s ease-in-out infinite alternate;
    }

    .stage::before {
      position: absolute;
      inset: 0;
      z-index: 8;
      pointer-events: none;
      content: "";
      opacity: 0.14;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.65'/%3E%3C/svg%3E");
      mix-blend-mode: soft-light;
    }

    .stage::after {
      position: absolute;
      right: -11%;
      bottom: -34%;
      width: 50%;
      aspect-ratio: 1;
      border: 1px solid rgba(217, 255, 67, 0.09);
      border-radius: 50%;
      content: "";
      box-shadow:
        0 0 0 6.2vw rgba(217, 255, 67, 0.018),
        0 0 0 12.4vw rgba(217, 255, 67, 0.012),
        0 0 0 18.6vw rgba(217, 255, 67, 0.008);
    }

    .topbar {
      position: absolute;
      top: 4.2%;
      right: 4.7%;
      left: 4.7%;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 1.15%;
      border-bottom: 1px solid var(--line);
      animation: reveal 900ms 80ms both;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 1.2vw;
      flex: none;
    }

    .brand-hero {
      flex: 1;
      display: flex;
      justify-content: center;
    }

    .brand-hero .brand {
      font-size: clamp(14px, 1.4vw, 26px);
      gap: 0.5vw;
    }

    .brand-hero .brand-mark {
      width: 1.8vw;
    }

    .back-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 1.6vw;
      min-width: 28px;
      aspect-ratio: 1;
      padding: 0;
      border: none;
      background: transparent;
      color: var(--muted);
      text-decoration: none;
      opacity: 0.45;
      transition: opacity 200ms ease, color 200ms ease, transform 200ms ease;
      flex: none;
    }

    .back-btn:hover {
      opacity: 1;
      color: var(--acid);
      transform: translateX(-2px);
    }

    .freq-display {
      display: flex;
      align-items: center;
      gap: 0.8vw;
      font-family: var(--condensed);
      font-size: clamp(7px, 0.6vw, 11px);
      color: var(--muted);
      flex: none;
    }

    .freq-display::before {
      content: '';
      width: 1px;
      height: 0.8vw;
      min-height: 10px;
      background: rgba(231, 229, 217, 0.18);
    }

    .freq-bars {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 12px;
    }

    .freq-bar {
      width: 3px;
      background: var(--acid);
      border-radius: 1px;
      animation: freqPulse 1.5s ease-in-out infinite;
      transition: opacity 0.3s ease;
    }

    @keyframes freqPulse {
      0%, 100% { opacity: 0.2; transform: scaleY(0.6); }
      50% { opacity: 1; transform: scaleY(1); }
    }

    .brand,
    .live-state,
    .eyebrow,
    .meta,
    .time,
    .side-note {
      text-transform: uppercase;
      letter-spacing: 0.18em;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.4vw;
      font-family: var(--condensed);
      font-size: clamp(8px, 0.78vw, 15px);
      font-weight: 700;
      color: inherit;
      text-decoration: none;
      transition: opacity 200ms ease;
    }

    .brand:hover {
      opacity: 0.8;
    }

    .brand-mark {
      position: relative;
      width: 1.25vw;
      min-width: 12px;
      aspect-ratio: 1;
      border: 1px solid var(--acid);
      border-radius: 50%;
      animation: brandPulse 3s ease-in-out infinite;
    }

    .brand-mark::after {
      position: absolute;
      inset: 31%;
      border-radius: 50%;
      background: var(--acid);
      content: "";
    }

    @keyframes brandPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(217, 255, 67, 0); }
      50% { box-shadow: 0 0 8px 2px rgba(217, 255, 67, 0.2); }
    }

    .frequency {
      color: var(--muted);
      font-size: clamp(7px, 0.62vw, 12px);
      font-weight: 500;
    }

    .live-state {
      display: flex;
      align-items: center;
      gap: 0.65vw;
      color: var(--acid);
      font-size: clamp(7px, 0.65vw, 12px);
      font-weight: 700;
      flex: none;
      text-shadow: 0 0 8px rgba(217, 255, 67, 0.3);
    }

    .pulse {
      width: 0.45vw;
      min-width: 5px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: var(--acid);
      box-shadow: 0 0 0 0 rgba(217, 255, 67, 0.35);
      animation: signal 2s infinite;
    }

    @keyframes signal {
      0% { box-shadow: 0 0 0 0 rgba(217, 255, 67, 0.45); }
      70% { box-shadow: 0 0 0 10px rgba(217, 255, 67, 0); }
      100% { box-shadow: 0 0 0 0 rgba(217, 255, 67, 0); }
    }

    .content {
      position: absolute;
      top: 14.6%;
      right: 4.7%;
      bottom: 7.3%;
      left: 4.7%;
      z-index: 2;
      display: grid;
      grid-template-columns: 42% 1fr;
      gap: 4%;
    }

    .program-visual {
      position: relative;
      align-self: start;
      width: 100%;
      aspect-ratio: 1;
      overflow: hidden;
      color: var(--ink);
      background: #060705;
      box-shadow:
        0 2.2vw 5vw rgba(0, 0, 0, 0.42),
        0 0 0 1px rgba(255, 255, 255, 0.035),
        inset 0 0 4vw rgba(0, 0, 0, 0.2);
      animation: coverIn 1000ms cubic-bezier(.2,.8,.2,1) both;
      border-radius: 50%;
      transition: box-shadow 600ms ease;
    }

    .program-visual.spinning {
      box-shadow:
        0 2.6vw 5.8vw rgba(0, 0, 0, 0.5),
        0 0 34px rgba(217, 255, 67, 0.13),
        0 0 90px rgba(217, 255, 67, 0.07),
        0 0 0 1px rgba(217, 255, 67, 0.18);
    }

    .program-visual img {
      position: absolute;
      inset: 0;
      z-index: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(0.72) contrast(1.08) brightness(0.82);
      transform: scale(1.01);
      transition: filter 800ms ease;
    }

    .program-visual.spinning img {
      filter: saturate(0.94) contrast(1.08) brightness(0.92);
    }

    .vinyl-grooves,
    .vinyl-reflection {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      pointer-events: none;
    }

    .vinyl-grooves {
      z-index: 1;
      opacity: 0.3;
      background:
        repeating-radial-gradient(circle, transparent 0 2.2%, rgba(0, 0, 0, 0.12) 2.35% 2.7%),
        radial-gradient(circle, transparent 0 12%, rgba(0, 0, 0, 0.1) 12.2% 48%, rgba(0, 0, 0, 0.2) 76% 100%);
      mix-blend-mode: multiply;
    }

    .vinyl-reflection {
      z-index: 3;
      opacity: 0.24;
      background:
        conic-gradient(from 212deg, transparent 0 16%, rgba(255, 255, 255, 0.22) 20%, transparent 27% 62%, rgba(217, 255, 67, 0.09) 68%, transparent 74%),
        radial-gradient(circle at 36% 28%, rgba(255, 255, 255, 0.18), transparent 22%);
      mix-blend-mode: screen;
      transition: opacity 700ms ease;
    }

    .program-visual.spinning .vinyl-reflection {
      opacity: 0.38;
      animation: reflectionOrbit 16s linear infinite;
    }

    .program-visual::before {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 18%;
      height: 18%;
      border-radius: 50%;
      background:
        radial-gradient(circle, #050604 0 18%, var(--acid) 19% 21%, #0e100c 22% 56%, rgba(217, 255, 67, 0.26) 57% 59%, #080907 60%);
      border: 1px solid rgba(231, 229, 217, 0.22);
      transform: translate(-50%, -50%);
      z-index: 4;
      content: "";
    }

    .program-visual::after {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      z-index: 5;
      border: 1px solid rgba(255, 255, 255, 0.13);
      content: "";
      box-shadow:
        inset 0 0 36px rgba(0, 0, 0, 0.5),
        inset 0 0 0 2px rgba(255, 255, 255, 0.02),
        0 0 0 8px rgba(217, 255, 67, 0.045),
        0 0 0 16px rgba(217, 255, 67, 0.018);
    }

    .program-visual.spinning img {
      animation: spin 40s linear infinite;
    }

    @keyframes spin {
      from { transform: scale(1.01) rotate(0deg); }
      to { transform: scale(1.01) rotate(360deg); }
    }

    .panel {
      position: relative;
      display: flex;
      min-width: 0;
      flex-direction: column;
      padding-top: 1.5%;
    }

    .eyebrow {
      display: flex;
      align-items: center;
      gap: 0.8vw;
      margin: 0 0 2.2%;
      color: var(--acid);
      font-family: var(--condensed);
      font-size: clamp(7px, 0.64vw, 12px);
      font-weight: 800;
      animation: reveal 700ms 350ms both;
    }

    .eyebrow::before {
      width: 2.7vw;
      height: 1px;
      background: linear-gradient(90deg, var(--acid), transparent);
      content: "";
    }

    .show-title {
      max-width: 90%;
      margin: 0;
      font-family: var(--serif);
      font-size: clamp(28px, 4.25vw, 82px);
      font-weight: 400;
      line-height: 0.95;
      letter-spacing: -0.055em;
      animation: reveal 900ms 430ms both;
      text-wrap: balance;
      transition: text-shadow 700ms ease;
    }

    .stage.is-playing .show-title {
      text-shadow: 0 0 38px rgba(217, 255, 67, 0.06);
    }

    #playback-status {
      transition: color 400ms ease, text-shadow 400ms ease;
    }

    .stage.is-playing #playback-status {
      color: var(--acid);
      text-shadow: 0 0 12px rgba(217, 255, 67, 0.34);
    }

    .show-title em {
      color: var(--acid);
      font-weight: 400;
      font-style: italic;
    }

    .meta {
      display: flex;
      gap: 2.3vw;
      margin-top: 3.2%;
      color: var(--muted);
      font-size: clamp(6px, 0.58vw, 11px);
      font-weight: 600;
      animation: reveal 700ms 540ms both;
    }

    .meta strong {
      margin-left: 0.45vw;
      color: var(--paper);
      font-weight: 600;
    }

    .transcript {
      position: relative;
      display: grid;
      align-content: center;
      flex: 1;
      min-height: 0;
      margin-top: auto;
      padding: 1.5% 0 1.5% 4.7%;
      border-left: 1px solid transparent;
      border-image: linear-gradient(180deg, transparent, rgba(217, 255, 67, 0.58), transparent) 1;
      animation: reveal 900ms 650ms both;
    }

    .transcript::after {
      position: absolute;
      top: 12%;
      bottom: 12%;
      left: -1px;
      width: 1px;
      background: linear-gradient(180deg, transparent, var(--acid), transparent);
      content: "";
      opacity: 0;
      transform: scaleY(0.35);
      transition: opacity 500ms ease, transform 700ms ease;
    }

    .stage.is-playing .transcript::after {
      opacity: 0.6;
      transform: scaleY(1);
    }

    .lyric {
      margin: 0;
      font-family: var(--serif);
      line-height: 1.48;
    }

    .lyric.previous {
      color: rgba(231, 229, 217, 0.24);
      font-size: clamp(9px, 0.93vw, 18px);
    }

    .lyric.current {
      position: relative;
      color: var(--paper);
      font-size: clamp(16px, 1.65vw, 32px);
      letter-spacing: -0.02em;
      text-shadow: 0 0 28px rgba(231, 229, 217, 0.045);
    }

    .lyric.current.is-entering {
      animation: cueIn 620ms cubic-bezier(.2,.8,.2,1) both;
    }

    .lyric.current::before {
      position: absolute;
      top: 0.72em;
      left: calc(-4.7% - 4px);
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--acid);
      content: "";
      box-shadow: 0 0 16px rgba(217, 255, 67, 0.55);
      animation: lyricPulse 2s ease-in-out infinite;
    }

    @keyframes lyricPulse {
      0%, 100% { box-shadow: 0 0 12px rgba(217, 255, 67, 0.4); }
      50% { box-shadow: 0 0 22px rgba(217, 255, 67, 0.7); }
    }

    .lyric.next {
      color: rgba(231, 229, 217, 0.4);
      font-size: clamp(9px, 0.93vw, 18px);
    }

    .player {
      margin-top: 3.8%;
      animation: reveal 900ms 740ms both;
      transition: filter 600ms ease, opacity 600ms ease;
    }

    .stage:not(.is-playing) .player {
      filter: saturate(0.72);
    }

    .track-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 2vw;
      margin-bottom: 2%;
    }

    .time {
      flex: none;
      color: var(--muted);
      font-family: var(--condensed);
      font-size: clamp(7px, 0.65vw, 12px);
    }

    .time b {
      color: var(--paper);
      font-weight: 600;
    }

    .progress {
      position: relative;
      width: 100%;
      height: 12px;
      display: flex;
      align-items: center;
      cursor: pointer;
    }

    .progress-track {
      position: relative;
      width: 100%;
      height: 3px;
      background: linear-gradient(90deg, rgba(231, 229, 217, 0.1), rgba(231, 229, 217, 0.2));
      border-radius: 2px;
    }

    .progress-fill {
      position: relative;
      width: 0%;
      height: 3px;
      background: var(--acid);
      transition: width 100ms linear;
      border-radius: 2px;
      box-shadow: 0 0 8px rgba(217, 255, 67, 0.4);
    }

    .progress.dragging .progress-fill {
      transition: none;
    }

    .progress.dragging .progress-fill::after {
      opacity: 1;
    }

    .progress.dragging .progress-track {
      height: 5px;
    }

    .progress-fill::after {
      position: absolute;
      top: 50%;
      right: 0;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--acid);
      content: "";
      transform: translate(50%, -50%);
      box-shadow: 0 0 14px rgba(217, 255, 67, 0.45);
      opacity: 0;
      transition: opacity 150ms ease;
    }

    .progress:hover .progress-fill::after {
      opacity: 1;
    }

    .progress:hover .progress-track {
      height: 5px;
    }

    .transport {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 2vw;
      margin-top: 3.4%;
    }

    .play-button {
      display: grid;
      width: 3.25vw;
      min-width: 44px;
      aspect-ratio: 1;
      padding: 0;
      place-items: center;
      border: 1px solid rgba(217, 255, 67, 0.78);
      border-radius: 50%;
      background: rgba(217, 255, 67, 0.035);
      box-shadow: inset 0 0 0 5px rgba(217, 255, 67, 0.025);
      transition: box-shadow 300ms ease, transform 150ms ease, background 300ms ease;
    }

    .play-button:hover {
      background: rgba(217, 255, 67, 0.1);
      box-shadow: 0 0 26px rgba(217, 255, 67, 0.22), inset 0 0 0 5px rgba(217, 255, 67, 0.04);
      transform: scale(1.06);
    }

    .stage.is-playing .play-button {
      background: rgba(217, 255, 67, 0.09);
      box-shadow:
        0 0 24px rgba(217, 255, 67, 0.18),
        inset 0 0 0 5px rgba(217, 255, 67, 0.035);
    }

    .play-button:active {
      transform: scale(0.96);
    }

    .play-icon {
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 6px 0 6px 10px;
      border-color: transparent transparent transparent var(--acid);
      margin-left: 2px;
    }

    .pause-icon {
      display: flex;
      gap: 4px;
    }

    .pause-icon::before,
    .pause-icon::after {
      width: 2px;
      height: 12px;
      background: var(--acid);
      content: "";
    }

    .visualizer {
      display: flex;
      height: 2.55vw;
      min-height: 25px;
      align-items: center;
      gap: clamp(2px, 0.22vw, 5px);
      overflow: hidden;
      opacity: 0.22;
      mask-image: linear-gradient(90deg, transparent, #000 7%, #000 93%, transparent);
      transition: opacity 500ms ease, filter 500ms ease;
    }

    .stage.is-playing .visualizer {
      opacity: 0.82;
      filter: drop-shadow(0 0 5px rgba(217, 255, 67, 0.18));
    }

    .bar {
      width: 2px;
      height: var(--h);
      min-height: 2px;
      border-radius: 4px;
      background: linear-gradient(to top, rgba(217, 255, 67, 0.18), var(--acid));
      transform-origin: center;
      animation: wave var(--d) ease-in-out var(--delay) infinite alternate;
    }

    .side-note {
      color: var(--muted);
      font-size: clamp(6px, 0.54vw, 10px);
      text-align: right;
      line-height: 1.7;
    }

    .volume-control {
      display: flex;
      align-items: center;
      gap: 0.8vw;
      flex: none;
    }

    .volume-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 1.8vw;
      min-width: 18px;
      aspect-ratio: 1;
      padding: 0;
      border: 1px solid rgba(231, 229, 217, 0.15);
      border-radius: 50%;
      background: transparent;
      color: var(--muted);
      font-size: clamp(9px, 0.7vw, 13px);
      cursor: pointer;
      transition: color 200ms ease, border-color 200ms ease;
    }

    .volume-btn:hover {
      color: var(--paper);
      border-color: rgba(231, 229, 217, 0.3);
    }

    .volume-btn.muted {
      color: #ff927d;
      border-color: rgba(255, 146, 125, 0.3);
    }

    .volume-slider {
      width: 5vw;
      min-width: 50px;
      max-width: 80px;
      height: 4px;
      -webkit-appearance: none;
      appearance: none;
      background: rgba(231, 229, 217, 0.18);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    .volume-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--acid);
      cursor: pointer;
      box-shadow: 0 0 8px rgba(217, 255, 67, 0.4);
      transition: transform 150ms ease;
    }

    .volume-slider::-webkit-slider-thumb:hover {
      transform: scale(1.3);
      box-shadow: 0 0 14px rgba(217, 255, 67, 0.6);
    }

    .volume-slider::-moz-range-thumb {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--acid);
      cursor: pointer;
      border: none;
      box-shadow: 0 0 8px rgba(217, 255, 67, 0.4);
    }

    .volume-value {
      color: var(--muted);
      font-family: var(--condensed);
      font-size: clamp(6px, 0.5vw, 10px);
      min-width: 2vw;
      text-align: right;
    }

    .corner-code {
      position: absolute;
      right: 0;
      bottom: 0;
      color: rgba(231, 229, 217, 0.23);
      font-family: monospace;
      font-size: clamp(6px, 0.5vw, 10px);
      letter-spacing: 0.12em;
    }

    .stage:not(.is-playing) .bar,
    .stage:not(.is-playing) .freq-bar {
      animation-play-state: paused;
    }

    @keyframes wave {
      0% { transform: scaleY(0.15) translateY(2px); opacity: 0.3; }
      20% { transform: scaleY(1.15) translateY(-1px); opacity: 1; }
      40% { transform: scaleY(0.4) translateY(1px); opacity: 0.5; }
      60% { transform: scaleY(1.05) translateY(-2px); opacity: 0.95; }
      80% { transform: scaleY(0.25) translateY(1px); opacity: 0.4; }
      100% { transform: scaleY(0.8) translateY(-1px); opacity: 0.7; }
    }

    @keyframes coverIn {
      from { opacity: 0; transform: translateY(3%) scale(0.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes ambientDrift {
      0% { transform: translate3d(-1.5%, 0, 0) scale(1.03); }
      50% { transform: translate3d(1%, -1.5%, 0) scale(1.08); }
      100% { transform: translate3d(2%, 1%, 0) scale(1.04); }
    }

    @keyframes reflectionOrbit {
      to { transform: rotate(360deg); }
    }

    @keyframes cueIn {
      from { opacity: 0; transform: translateY(0.55em); filter: blur(5px); }
      to { opacity: 1; transform: translateY(0); filter: blur(0); }
    }

    @keyframes reveal {
      from { opacity: 0; transform: translateY(12px); filter: blur(2px); }
      to { opacity: 1; transform: translateY(0); filter: blur(0); }
    }

    @media (max-width: 820px) {
      html,
      body {
        min-height: 100%;
      }

      body {
        display: block;
        overflow-x: hidden;
        overflow-y: auto;
        background: var(--ink);
      }

      .stage {
        width: 100%;
        min-height: 100svh;

      }

      .topbar {

      .topbar-left {

      .brand-hero {

      .content {

      }

      .program-visual {

    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;

  <audio id="audio-player" preload="auto"></audio>

  <script type="module">
    import { getWorkspaceDetail, getWorkspaceFileUrl } from '/js/api.js';

    const urlParams = new URLSearchParams(window.location.search);
    const showName = urlParams.get('name');

    if (!showName) {
      window.location.href = '/index.html';
    }

    const audioPlayer = document.getElementById('audio-player');
    audioPlayer.volume = 0.5;
    const stage = document.querySelector('.stage');
    const playButton = document.getElementById('play-button');
    const playIcon = document.getElementById('play-icon');
    const programVisual = document.querySelector('.program-visual');
    const progressBar = document.getElementById('progress-bar');
    const progressFill = document.getElementById('progress-fill');
    const currentTimeEl = document.getElementById('current-time');
    const durationEl = document.getElementById('duration');
    const showTitle = document.getElementById('show-title');
    const coverImage = document.getElementById('cover-image');
    const trackCount = document.getElementById('track-count');
    const lyricPrev = document.getElementById('lyric-prev');
    const lyricCurrent = document.getElementById('lyric-current');
    const lyricNext = document.getElementById('lyric-next');
    const liveTime = document.getElementById('live-time');
    const volumeBtn = document.getElementById('volume-btn');
    const volumeSlider = document.getElementById('volume-slider');
    const volumeValue = document.getElementById('volume-value');
    const volumeWave1 = document.getElementById('volume-wave-1');
    const volumeWave2 = document.getElementById('volume-wave-2');
    const playbackStatus = document.getElementById('playback-status');

    let cues = [];
    let isPlaying = false;
    let lastVolume = 0.5;
    let activeCueIndex = -1;

    // Volume control
    function updateVolumeIcon(volume, muted) {
      if (muted || volume === 0) {
        volumeWave1.style.display = 'none';
        volumeWave2.style.display = 'none';
        volumeBtn.classList.add('muted');
      } else if (volume < 0.5) {
        volumeWave1.style.display = '';
        volumeWave2.style.display = 'none';
        volumeBtn.classList.remove('muted');
      } else {
        volumeWave1.style.display = '';
        volumeWave2.style.display = '';
        volumeBtn.classList.remove('muted');
      }
    }

    function setVolume(volume) {
      audioPlayer.volume = Math.max(0, Math.min(1, volume));
      audioPlayer.muted = false;
      volumeSlider.value = Math.round(audioPlayer.volume * 100);
      volumeValue.textContent = volumeSlider.value;
      updateVolumeIcon(audioPlayer.volume, false);
      localStorage.setItem('vibefm-volume', audioPlayer.volume);
    }

    volumeSlider.addEventListener('input', () => {
      const volume = volumeSlider.value / 100;
      audioPlayer.volume = volume;
      audioPlayer.muted = false;
      volumeValue.textContent = volumeSlider.value;
      updateVolumeIcon(volume, false);
      localStorage.setItem('vibefm-volume', volume);
    });

    volumeBtn.addEventListener('click', () => {
      if (audioPlayer.muted || audioPlayer.volume === 0) {
        audioPlayer.volume = lastVolume || 1;
        audioPlayer.muted = false;
      } else {
        lastVolume = audioPlayer.volume;
        audioPlayer.muted = true;
      }
      volumeSlider.value = Math.round(audioPlayer.volume * 100);
      volumeValue.textContent = audioPlayer.muted ? '0' : volumeSlider.value;
      updateVolumeIcon(audioPlayer.volume, audioPlayer.muted);
    });

    // Load saved volume
    const savedVolume = localStorage.getItem('vibefm-volume');
    if (savedVolume !== null) {
      audioPlayer.volume = parseFloat(savedVolume);
      volumeSlider.value = Math.round(audioPlayer.volume * 100);
      volumeValue.textContent = volumeSlider.value;
      updateVolumeIcon(audioPlayer.volume, false);
    }

    // Format time as MM:SS
    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    }

    // Parse SRT format
    function parseSrt(text) {
      const lines = text.trim().split('\n');
      const cues = [];
      let i = 0;

      while (i < lines.length) {
        // Skip empty lines
        if (!lines[i].trim()) {
          i++;
          continue;
        }

        // Parse index
        const index = parseInt(lines[i], 10);
        if (isNaN(index)) {
          i++;
          continue;
        }
        i++;

        // Parse timestamps
        if (i >= lines.length) break;
        const timeMatch = lines[i].match(
          /(\d{2}):(\d{2}):(\d{2})[,.](\d{3})\s*-->\s*(\d{2}):(\d{2}):(\d{2})[,.](\d{3})/
        );
        if (!timeMatch) {
          i++;
          continue;
        }

        const start =
          parseInt(timeMatch[1]) * 3600 +
          parseInt(timeMatch[2]) * 60 +
          parseInt(timeMatch[3]) +
          parseInt(timeMatch[4]) / 1000;
        const end =
          parseInt(timeMatch[5]) * 3600 +
          parseInt(timeMatch[6]) * 60 +
          parseInt(timeMatch[7]) +
          parseInt(timeMatch[8]) / 1000;
        i++;

        // Parse text
        const textLines = [];
        while (i < lines.length && lines[i].trim()) {
          textLines.push(lines[i].trim());
          i++;
        }

        cues.push({
          index,
          start,
          end,
          text: textLines.join(' '),
        });
      }

      return cues;
    }

    // Sync subtitles
    function syncSubtitles(currentTime) {
      if (cues.length === 0) return;

      let currentIndex = -1;
      for (let i = 0; i < cues.length; i++) {
        if (currentTime >= cues[i].start && currentTime <= cues[i].end) {
          currentIndex = i;
          break;
        }
      }

      if (currentIndex === -1) {
        // Find nearest upcoming cue
        for (let i = 0; i < cues.length; i++) {
          if (currentTime < cues[i].start) {
            currentIndex = i;
            break;
          }
        }
      }

      if (currentIndex >= 0) {
        if (activeCueIndex === currentIndex) return;
        activeCueIndex = currentIndex;
        lyricPrev.textContent = currentIndex > 0 ? cues[currentIndex - 1].text : '';
        lyricCurrent.textContent = cues[currentIndex].text;
        lyricNext.textContent = currentIndex < cues.length - 1 ? cues[currentIndex + 1].text : '';
        lyricCurrent.classList.remove('is-entering');
        void lyricCurrent.offsetWidth;
        lyricCurrent.classList.add('is-entering');
      }
    }

    // Load show details
    async function loadShow() {
      try {
        const detail = await getWorkspaceDetail(showName);

        // Update UI
        showTitle.innerHTML = detail.title || detail.name;
        trackCount.textContent = detail.tracks?.length || 0;

        // Set cover image
        if (detail.playlistImageUrl) {
          coverImage.src = detail.playlistImageUrl;
          coverImage.alt = detail.title || detail.name;
        } else {
          coverImage.src = 'https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?auto=format&fit=crop&w=800&q=84';
          coverImage.alt = '默认封面';
        }

        // Load audio
        if (detail.hasOutput) {
          const audioUrl = getWorkspaceFileUrl(showName, 'output', 'program.mp3');
          audioPlayer.src = audioUrl;
          playbackStatus.textContent = 'Buffering';

          // Load subtitles
          try {
            const srtUrl = getWorkspaceFileUrl(showName, 'output', 'program.srt');
            const srtResponse = await fetch(srtUrl);
            if (srtResponse.ok) {
              const srtText = await srtResponse.text();
              cues = parseSrt(srtText);
            }
          } catch (e) {
            console.warn('Failed to load subtitles:', e);
          }

          // Auto-play
          audioPlayer.addEventListener('canplay', function onCanPlay() {
            audioPlayer.removeEventListener('canplay', onCanPlay);
            playbackStatus.textContent = 'Ready';
            audioPlayer.play().catch(() => {});
          });
        } else {
          playbackStatus.textContent = 'No Audio';
          lyricCurrent.textContent = '节目音频尚未生成';
        }
      } catch (error) {
        console.error('Failed to load show:', error);
        showTitle.innerHTML = 'Error loading show';
        playbackStatus.textContent = 'Error';
        lyricCurrent.textContent = '无法载入节目，请返回后重试';
      }
    }

    // Play/Pause
    playButton.addEventListener('click', () => {
      if (isPlaying) {
        audioPlayer.pause();
      } else {
        audioPlayer.play();
      }
    });

    audioPlayer.addEventListener('play', () => {
      isPlaying = true;
      playIcon.className = 'pause-icon';
      playButton.setAttribute('aria-label', '暂停');
      programVisual.classList.add('spinning');
      stage.classList.add('is-playing');
      playbackStatus.textContent = 'On Air';
      liveTime.textContent = 'On Air';
    });

    audioPlayer.addEventListener('pause', () => {
      isPlaying = false;
      playIcon.className = 'play-icon';
      playButton.setAttribute('aria-label', '播放');
      programVisual.classList.remove('spinning');
      stage.classList.remove('is-playing');
      playbackStatus.textContent = audioPlayer.ended ? 'Ended' : 'Paused';
      liveTime.textContent = audioPlayer.ended ? 'Ended' : 'Standby';
    });

    audioPlayer.addEventListener('error', () => {
      stage.classList.remove('is-playing');
      playbackStatus.textContent = 'Signal Lost';
      liveTime.textContent = 'Offline';
      lyricCurrent.textContent = '音频信号中断，请稍后重试';
    });

    // Time update
    audioPlayer.addEventListener('timeupdate', () => {
      const { currentTime, duration } = audioPlayer;
      if (!duration) return;

      const progress = (currentTime / duration) * 100;
      progressFill.style.width = `${progress}%`;
      progressBar.setAttribute('aria-valuenow', String(Math.round(progress)));
      progressBar.setAttribute('aria-valuetext', `${formatTime(currentTime)} / ${formatTime(duration)}`);
      currentTimeEl.textContent = formatTime(currentTime);
      syncSubtitles(currentTime);
    });

    audioPlayer.addEventListener('loadedmetadata', () => {
      durationEl.textContent = formatTime(audioPlayer.duration);
    });

    // Progress bar drag seek
    let isDragging = false;

    function seekToPosition(clientX) {
      const rect = progressBar.getBoundingClientRect();
      const percent = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
      progressFill.style.width = `${percent * 100}%`;
      if (audioPlayer.duration) {
        audioPlayer.currentTime = percent * audioPlayer.duration;
      }
    }

    progressBar.addEventListener('mousedown', (e) => {
      isDragging = true;
      progressBar.classList.add('dragging');
      seekToPosition(e.clientX);
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      seekToPosition(e.clientX);
    });

    document.addEventListener('mouseup', () => {
      if (isDragging) {
        isDragging = false;
        progressBar.classList.remove('dragging');
      }
    });

    // Touch support
    progressBar.addEventListener('touchstart', (e) => {
      isDragging = true;
      progressBar.classList.add('dragging');
      seekToPosition(e.touches[0].clientX);
      e.preventDefault();
    }, { passive: false });

    document.addEventListener('touchmove', (e) => {
      if (!isDragging) return;
      seekToPosition(e.touches[0].clientX);
    }, { passive: false });

    document.addEventListener('touchend', () => {
      if (isDragging) {
        isDragging = false;
        progressBar.classList.remove('dragging');
      }
    });

    // Update live time
    function updateLiveTime() {
      if (isPlaying) {
        const mins = Math.floor(audioPlayer.currentTime / 60);
        const secs = Math.floor(audioPlayer.currentTime % 60);
        liveTime.textContent = `On Air · ${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
      }
      requestAnimationFrame(updateLiveTime);
    }

    // Keyboard shortcuts
    const SEEK_STEP = 5;  // seconds
    const VOLUME_STEP = 0.1;

    document.addEventListener('keydown', (e) => {
      // Ignore if user is typing in an input
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

      switch (e.key) {
        case ' ':
        case 'k':
          e.preventDefault();
          if (isPlaying) {
            audioPlayer.pause();
          } else {
            audioPlayer.play();
          }
          break;

        case 'ArrowLeft':
          e.preventDefault();
          audioPlayer.currentTime = Math.max(0, audioPlayer.currentTime - SEEK_STEP);
          break;

        case 'ArrowRight':
          e.preventDefault();
          audioPlayer.currentTime = Math.min(audioPlayer.duration, audioPlayer.currentTime + SEEK_STEP);
          break;

        case 'ArrowUp':
          e.preventDefault();
          audioPlayer.volume = Math.min(1, audioPlayer.volume + VOLUME_STEP);
          volumeSlider.value = Math.round(audioPlayer.volume * 100);
          volumeValue.textContent = volumeSlider.value;
          updateVolumeIcon(audioPlayer.volume, false);
          localStorage.setItem('vibefm-volume', audioPlayer.volume);
          break;

        case 'ArrowDown':
          e.preventDefault();
          audioPlayer.volume = Math.max(0, audioPlayer.volume - VOLUME_STEP);
          volumeSlider.value = Math.round(audioPlayer.volume * 100);
          volumeValue.textContent = volumeSlider.value;
          updateVolumeIcon(audioPlayer.volume, false);
          localStorage.setItem('vibefm-volume', audioPlayer.volume);
          break;

        case 'm':
        case 'M':
          e.preventDefault();
          if (audioPlayer.muted) {
            audioPlayer.muted = false;
          } else {
            lastVolume = audioPlayer.volume;
            audioPlayer.muted = true;
          }
          volumeSlider.value = Math.round(audioPlayer.volume * 100);
          volumeValue.textContent = audioPlayer.muted ? '0' : volumeSlider.value;
          updateVolumeIcon(audioPlayer.volume, audioPlayer.muted);
          break;

        case 'Home':
          e.preventDefault();
          audioPlayer.currentTime = 0;
          break;

        case 'End':
          e.preventDefault();
          audioPlayer.currentTime = audioPlayer.duration;
          break;
      }
    });

    // Initialize
    loadShow();
    updateLiveTime();
  </script>
</body>
</html>
