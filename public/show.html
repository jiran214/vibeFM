<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>vibeFM · Now Playing</title>
  <link rel="stylesheet" href="/css/app.css">
  <style>
    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      display: grid;
      place-items: center;
      overflow: hidden;
      color: var(--paper);
      background:
        radial-gradient(circle at 77% 17%, rgba(217, 255, 67, 0.055), transparent 25%),
        #030403;
      font-family: var(--sans);
    }

    button {
      color: inherit;
      font: inherit;
    }

    .stage {
      position: relative;
      width: min(100vw, calc(100vh * 16 / 9));
      aspect-ratio: 16 / 9;
      overflow: hidden;
      isolation: isolate;
      background:
        radial-gradient(ellipse at 30% 50%, rgba(217, 255, 67, 0.08), transparent 50%),
        linear-gradient(90deg, transparent 49.95%, rgba(255, 255, 255, 0.025) 50%, transparent 50.05%),
        linear-gradient(rgba(255, 255, 255, 0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.018) 1px, transparent 1px),
        var(--ink);
      background-size: 100% 100%, 100% 100%, 4.7vw 4.7vw, 4.7vw 4.7vw, auto;
    }

    .stage::before {
      position: absolute;
      inset: 0;
      z-index: 8;
      pointer-events: none;
      content: "";
      opacity: 0.14;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 180 180' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='.65'/%3E%3C/svg%3E");
      mix-blend-mode: soft-light;
    }

    .stage::after {
      position: absolute;
      right: -11%;
      bottom: -34%;
      width: 50%;
      aspect-ratio: 1;
      border: 1px solid rgba(217, 255, 67, 0.09);
      border-radius: 50%;
      content: "";
      box-shadow:
        0 0 0 6.2vw rgba(217, 255, 67, 0.018),
        0 0 0 12.4vw rgba(217, 255, 67, 0.012),
        0 0 0 18.6vw rgba(217, 255, 67, 0.008);
    }

    .topbar {
      position: absolute;
      top: 4.2%;
      right: 4.7%;
      left: 4.7%;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 1.15%;
      border-bottom: 1px solid var(--line);
      animation: reveal 900ms 80ms both;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 1.2vw;
      flex: none;
    }

    .brand-hero {
      flex: 1;
      display: flex;
      justify-content: center;
    }

    .brand-hero .brand {
      font-size: clamp(14px, 1.4vw, 26px);
      gap: 1vw;
    }

    .brand-hero .brand-mark {
      width: 1.8vw;
    }

    .back-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 1.8vw;
      min-width: 20px;
      aspect-ratio: 1;
      padding: 0;
      border: 1px solid rgba(231, 229, 217, 0.15);
      border-radius: 50%;
      background: transparent;
      color: var(--muted);
      font-size: clamp(9px, 0.7vw, 13px);
      text-decoration: none;
      opacity: 0.4;
      transition: opacity 200ms ease, border-color 200ms ease;
      flex: none;
    }

    .back-btn:hover {
      opacity: 0.7;
      border-color: rgba(231, 229, 217, 0.3);
    }

    .freq-display {
      display: flex;
      align-items: center;
      gap: 1vw;
      font-family: var(--condensed);
      font-size: clamp(7px, 0.6vw, 11px);
      color: var(--muted);
      flex: none;
    }

    .freq-bars {
      display: flex;
      align-items: flex-end;
      gap: 2px;
      height: 12px;
    }

    .freq-bar {
      width: 3px;
      background: var(--acid);
      border-radius: 1px;
      animation: freqPulse 1.5s ease-in-out infinite;
    }

    @keyframes freqPulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 1; }
    }

    .brand,
    .live-state,
    .eyebrow,
    .meta,
    .time,
    .side-note {
      text-transform: uppercase;
      letter-spacing: 0.18em;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.8vw;
      font-family: var(--condensed);
      font-size: clamp(8px, 0.78vw, 15px);
      font-weight: 700;
    }

    .brand-mark {
      position: relative;
      width: 1.25vw;
      min-width: 12px;
      aspect-ratio: 1;
      border: 1px solid var(--acid);
      border-radius: 50%;
    }

    .brand-mark::after {
      position: absolute;
      inset: 31%;
      border-radius: 50%;
      background: var(--acid);
      content: "";
    }

    .frequency {
      color: var(--muted);
      font-size: clamp(7px, 0.62vw, 12px);
      font-weight: 500;
    }

    .live-state {
      display: flex;
      align-items: center;
      gap: 0.65vw;
      color: var(--acid);
      font-size: clamp(7px, 0.65vw, 12px);
      font-weight: 700;
      flex: none;
    }

    .pulse {
      width: 0.45vw;
      min-width: 5px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: var(--acid);
      box-shadow: 0 0 0 0 rgba(217, 255, 67, 0.35);
      animation: signal 2s infinite;
    }

    .content {
      position: absolute;
      top: 14.6%;
      right: 4.7%;
      bottom: 7.3%;
      left: 4.7%;
      z-index: 2;
      display: grid;
      grid-template-columns: 42% 1fr;
      gap: 4%;
    }

    .program-visual {
      position: relative;
      align-self: start;
      width: 100%;
      aspect-ratio: 1;
      overflow: hidden;
      color: var(--ink);
      background: var(--panel);
      box-shadow: 0 2.2vw 5vw rgba(0, 0, 0, 0.36);
      animation: coverIn 1000ms cubic-bezier(.2,.8,.2,1) both;
      border-radius: 50%;
    }

    .program-visual img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(0.85) contrast(1.05);
    }

    .program-visual::before {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 18%;
      height: 18%;
      border-radius: 50%;
      background: var(--ink);
      border: 2px solid rgba(217, 255, 67, 0.3);
      transform: translate(-50%, -50%);
      z-index: 2;
      content: "";
    }

    .program-visual::after {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(255, 255, 255, 0.08);
      content: "";
      box-shadow:
        inset 0 0 30px rgba(0, 0, 0, 0.4),
        0 0 0 8px rgba(217, 255, 67, 0.06),
        0 0 0 16px rgba(217, 255, 67, 0.03);
    }

    .program-visual.spinning img {
      animation: spin 40s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .panel {
      position: relative;
      display: flex;
      min-width: 0;
      flex-direction: column;
      padding-top: 1.5%;
    }

    .eyebrow {
      display: flex;
      align-items: center;
      gap: 0.8vw;
      margin: 0 0 2.2%;
      color: var(--acid);
      font-family: var(--condensed);
      font-size: clamp(7px, 0.64vw, 12px);
      font-weight: 800;
      animation: reveal 700ms 350ms both;
    }

    .eyebrow::before {
      width: 2.7vw;
      height: 1px;
      background: var(--acid);
      content: "";
    }

    .show-title {
      max-width: 90%;
      margin: 0;
      font-family: var(--serif);
      font-size: clamp(28px, 4.25vw, 82px);
      font-weight: 400;
      line-height: 0.95;
      letter-spacing: -0.055em;
      animation: reveal 900ms 430ms both;
    }

    .show-title em {
      color: var(--acid);
      font-weight: 400;
    }

    .meta {
      display: flex;
      gap: 2.3vw;
      margin-top: 3.2%;
      color: var(--muted);
      font-size: clamp(6px, 0.58vw, 11px);
      font-weight: 600;
      animation: reveal 700ms 540ms both;
    }

    .meta strong {
      margin-left: 0.45vw;
      color: var(--paper);
      font-weight: 600;
    }

    .transcript {
      position: relative;
      display: grid;
      align-content: center;
      flex: 1;
      min-height: 0;
      margin-top: auto;
      padding: 1.5% 0 1.5% 4.7%;
      border-left: 1px solid var(--line);
      animation: reveal 900ms 650ms both;
    }

    .lyric {
      margin: 0;
      font-family: var(--serif);
      line-height: 1.48;
    }

    .lyric.previous {
      color: rgba(231, 229, 217, 0.24);
      font-size: clamp(9px, 0.93vw, 18px);
    }

    .lyric.current {
      position: relative;
      color: var(--paper);
      font-size: clamp(16px, 1.65vw, 32px);
      letter-spacing: -0.02em;
    }

    .lyric.current::before {
      position: absolute;
      top: 0.72em;
      left: calc(-4.7% - 4px);
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--acid);
      content: "";
      box-shadow: 0 0 16px rgba(217, 255, 67, 0.55);
    }

    .lyric.next {
      color: rgba(231, 229, 217, 0.4);
      font-size: clamp(9px, 0.93vw, 18px);
    }

    .player {
      margin-top: 3.8%;
      animation: reveal 900ms 740ms both;
    }

    .track-row {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 2vw;
      margin-bottom: 2%;
    }

    .time {
      flex: none;
      color: var(--muted);
      font-family: var(--condensed);
      font-size: clamp(7px, 0.65vw, 12px);
    }

    .time b {
      color: var(--paper);
      font-weight: 600;
    }

    .progress {
      position: relative;
      width: 100%;
      height: 12px;
      display: flex;
      align-items: center;
      cursor: pointer;
    }

    .progress-track {
      position: relative;
      width: 100%;
      height: 3px;
      background: rgba(231, 229, 217, 0.18);
      border-radius: 2px;
    }

    .progress-fill {
      position: relative;
      width: 0%;
      height: 3px;
      background: var(--acid);
      transition: width 100ms linear;
      border-radius: 2px;
    }

    .progress.dragging .progress-fill {
      transition: none;
    }

    .progress.dragging .progress-fill::after {
      opacity: 1;
    }

    .progress.dragging .progress-track {
      height: 5px;
    }

    .progress-fill::after {
      position: absolute;
      top: 50%;
      right: 0;
      width: 11px;
      height: 11px;
      border-radius: 50%;
      background: var(--acid);
      content: "";
      transform: translate(50%, -50%);
      box-shadow: 0 0 14px rgba(217, 255, 67, 0.45);
      opacity: 0;
      transition: opacity 150ms ease;
    }

    .progress:hover .progress-fill::after {
      opacity: 1;
    }

    .progress:hover .progress-track {
      height: 5px;
    }

    .transport {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: 2vw;
      margin-top: 3.4%;
    }

    .play-button {
      display: grid;
      width: 3.25vw;
      min-width: 34px;
      aspect-ratio: 1;
      padding: 0;
      place-items: center;
      border: 1px solid rgba(217, 255, 67, 0.78);
      border-radius: 50%;
      background: transparent;
    }

    .play-icon {
      width: 0;
      height: 0;
      border-style: solid;
      border-width: 6px 0 6px 10px;
      border-color: transparent transparent transparent var(--acid);
      margin-left: 2px;
    }

    .pause-icon {
      display: flex;
      gap: 4px;
    }

    .pause-icon::before,
    .pause-icon::after {
      width: 2px;
      height: 12px;
      background: var(--acid);
      content: "";
    }

    .visualizer {
      display: flex;
      height: 2.55vw;
      min-height: 25px;
      align-items: center;
      gap: clamp(2px, 0.22vw, 5px);
      overflow: hidden;
      opacity: 0.7;
      mask-image: linear-gradient(90deg, transparent, #000 7%, #000 93%, transparent);
    }

    .bar {
      width: 2px;
      height: var(--h);
      min-height: 2px;
      border-radius: 4px;
      background: linear-gradient(to top, rgba(217, 255, 67, 0.18), var(--acid));
      transform-origin: center;
      animation: wave var(--d) ease-in-out var(--delay) infinite alternate;
    }

    .side-note {
      color: var(--muted);
      font-size: clamp(6px, 0.54vw, 10px);
      text-align: right;
      line-height: 1.7;
    }

    .corner-code {
      position: absolute;
      right: 0;
      bottom: 0;
      color: rgba(231, 229, 217, 0.23);
      font-family: monospace;
      font-size: clamp(6px, 0.5vw, 10px);
      letter-spacing: 0.12em;
    }

    .waveform-deco {
      position: absolute;
      bottom: 2%;
      left: 4.7%;
      right: 4.7%;
      height: 20px;
      display: flex;
      align-items: center;
      gap: 2px;
      opacity: 0.15;
      mask-image: linear-gradient(90deg, transparent, #000 10%, #000 90%, transparent);
    }

    .waveform-line {
      flex: 1;
      height: 100%;
      background: var(--acid);
      border-radius: 1px;
      transform-origin: center;
      animation: waveformPulse 2s ease-in-out infinite;
    }

    @keyframes waveformPulse {
      0%, 100% { transform: scaleY(0.3); }
      50% { transform: scaleY(1); }
    }

    @keyframes wave {
      0% { transform: scaleY(0.15) translateY(2px); opacity: 0.3; }
      20% { transform: scaleY(1.15) translateY(-1px); opacity: 1; }
      40% { transform: scaleY(0.4) translateY(1px); opacity: 0.5; }
      60% { transform: scaleY(1.05) translateY(-2px); opacity: 0.95; }
      80% { transform: scaleY(0.25) translateY(1px); opacity: 0.4; }
      100% { transform: scaleY(0.8) translateY(-1px); opacity: 0.7; }
    }

    @keyframes coverIn {
      from { opacity: 0; transform: translateY(3%) scale(0.985); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes reveal {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.001ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>
<body>
  <main class="stage" aria-label="音乐电台正在播放界面">
    <header class="topbar">
      <div class="topbar-left">
        <a class="back-btn" href="/index.html" aria-label="返回首页">←</a>
        <div class="freq-display">
        <div class="freq-bars">
          <span class="freq-bar" style="height:40%;animation-delay:0s"></span>
          <span class="freq-bar" style="height:70%;animation-delay:0.2s"></span>
          <span class="freq-bar" style="height:50%;animation-delay:0.4s"></span>
          <span class="freq-bar" style="height:85%;animation-delay:0.1s"></span>
          <span class="freq-bar" style="height:60%;animation-delay:0.3s"></span>
        </div>
        <span>STEREO</span>
      </div>
      </div>
      <div class="brand-hero">
        <span class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          vibeFM

    <section class="content">

      <section class="panel">

            <div class="progress-track">
              <div class="progress-fill" id="progress-fill"></div>

          <div class="transport">
            <button class="play-button" type="button" aria-label="播放" id="play-button">

              <i class="bar" style="--h:31%;--d:.55s;--delay:-.35s"></i>
              <i class="bar" style="--h:78%;--d:.4s;--delay:-.15s"></i>
              <i class="bar" style="--h:92%;--d:.5s;--delay:-.22s"></i>
              <i class="bar" style="--h:44%;--d:.36s;--delay:-.08s"></i>
              <i class="bar" style="--h:86%;--d:.53s;--delay:-.4s"></i>
              <i class="bar" style="--h:52%;--d:.44s;--delay:-.18s"></i>
              <i class="bar" style="--h:28%;--d:.39s;--delay:-.12s"></i>
              <i class="bar" style="--h:74%;--d:.47s;--delay:-.28s"></i>
              <i class="bar" style="--h:91%;--d:.37s;--delay:-.05s"></i>
              <i class="bar" style="--h:48%;--d:.51s;--delay:-.32s"></i>
              <i class="bar" style="--h:70%;--d:.43s;--delay:-.15s"></i>
              <i class="bar" style="--h:36%;--d:.34s;--delay:-.22s"></i>
              <i class="bar" style="--h:69%;--d:.49s;--delay:-.08s"></i>
              <i class="bar" style="--h:25%;--d:.41s;--delay:-.35s"></i>
              <i class="bar" style="--h:63%;--d:.46s;--delay:-.15s"></i>
              <i class="bar" style="--h:49%;--d:.38s;--delay:-.28s"></i>
              <i class="bar" style="--h:77%;--d:.54s;--delay:-.05s"></i>
              <i class="bar" style="--h:40%;--d:.42s;--delay:-.2s"></i>
            </div>

            <div class="side-note">Stereo / 320 kbps<br>Signal 96%</div>
          </div>
        </div>

        <div class="corner-code" id="corner-code">vibeFM / 2026</div>
      </section>
    </section>

    <div class="waveform-deco" aria-hidden="true">
      <span class="waveform-line" style="animation-delay:0s"></span>
      <span class="waveform-line" style="animation-delay:0.1s"></span>
      <span class="waveform-line" style="animation-delay:0.2s"></span>
      <span class="waveform-line" style="animation-delay:0.3s"></span>
      <span class="waveform-line" style="animation-delay:0.4s"></span>
      <span class="waveform-line" style="animation-delay:0.5s"></span>
      <span class="waveform-line" style="animation-delay:0.6s"></span>
      <span class="waveform-line" style="animation-delay:0.7s"></span>
      <span class="waveform-line" style="animation-delay:0.8s"></span>
      <span class="waveform-line" style="animation-delay:0.9s"></span>
      <span class="waveform-line" style="animation-delay:1s"></span>
      <span class="waveform-line" style="animation-delay:1.1s"></span>
      <span class="waveform-line" style="animation-delay:1.2s"></span>
      <span class="waveform-line" style="animation-delay:1.3s"></span>
      <span class="waveform-line" style="animation-delay:1.4s"></span>
      <span class="waveform-line" style="animation-delay:1.5s"></span>
    </div>
  </main>

  <audio id="audio-player" preload="auto"></audio>

  <script type="module">
    import { getWorkspaceDetail, getWorkspaceFileUrl } from '/js/api.js';

    const urlParams = new URLSearchParams(window.location.search);
    const showName = urlParams.get('name');

    if (!showName) {
      window.location.href = '/index.html';
    }

    const audioPlayer = document.getElementById('audio-player');
    const playButton = document.getElementById('play-button');
    const playIcon = document.getElementById('play-icon');
    const programVisual = document.querySelector('.program-visual');
    const progressBar = document.getElementById('progress-bar');
    const progressFill = document.getElementById('progress-fill');
    const currentTimeEl = document.getElementById('current-time');
    const durationEl = document.getElementById('duration');
    const showTitle = document.getElementById('show-title');
    const coverImage = document.getElementById('cover-image');
    const trackCount = document.getElementById('track-count');
    const lyricPrev = document.getElementById('lyric-prev');
    const lyricCurrent = document.getElementById('lyric-current');
    const lyricNext = document.getElementById('lyric-next');
    const liveTime = document.getElementById('live-time');

    let cues = [];
    let isPlaying = false;

    // Format time as MM:SS
    function formatTime(seconds) {
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
    }

    // Parse SRT format
    function parseSrt(text) {
      const lines = text.trim().split('\n');
      const cues = [];
      let i = 0;

      while (i < lines.length) {
        // Skip empty lines
        if (!lines[i].trim()) {
          i++;
          continue;
        }

        // Parse index
        const index = parseInt(lines[i], 10);
        if (isNaN(index)) {
          i++;
          continue;
        }
        i++;

        // Parse timestamps
        if (i >= lines.length) break;
        const timeMatch = lines[i].match(
          /(\d{2}):(\d{2}):(\d{2})[,.](\d{3})\s*-->\s*(\d{2}):(\d{2}):(\d{2})[,.](\d{3})/
        );
        if (!timeMatch) {
          i++;
          continue;
        }

        const start =
          parseInt(timeMatch[1]) * 3600 +
          parseInt(timeMatch[2]) * 60 +
          parseInt(timeMatch[3]) +
          parseInt(timeMatch[4]) / 1000;
        const end =
          parseInt(timeMatch[5]) * 3600 +
          parseInt(timeMatch[6]) * 60 +
          parseInt(timeMatch[7]) +
          parseInt(timeMatch[8]) / 1000;
        i++;

        // Parse text
        const textLines = [];
        while (i < lines.length && lines[i].trim()) {
          textLines.push(lines[i].trim());
          i++;
        }

        cues.push({
          index,
          start,
          end,
          text: textLines.join(' '),
        });
      }

      return cues;
    }

    // Sync subtitles
    function syncSubtitles(currentTime) {
      if (cues.length === 0) return;

      let currentIndex = -1;
      for (let i = 0; i < cues.length; i++) {
        if (currentTime >= cues[i].start && currentTime <= cues[i].end) {
          currentIndex = i;
          break;
        }
      }

      if (currentIndex === -1) {
        // Find nearest upcoming cue
        for (let i = 0; i < cues.length; i++) {
          if (currentTime < cues[i].start) {
            currentIndex = i;
            break;
          }
        }
      }

      if (currentIndex >= 0) {
        lyricPrev.textContent = currentIndex > 0 ? cues[currentIndex - 1].text : '';
        lyricCurrent.textContent = cues[currentIndex].text;
        lyricNext.textContent = currentIndex < cues.length - 1 ? cues[currentIndex + 1].text : '';
      }
    }

    // Load show details
    async function loadShow() {
      try {
        const detail = await getWorkspaceDetail(showName);

        // Update UI
        showTitle.innerHTML = detail.title || detail.name;
        trackCount.textContent = detail.tracks?.length || 0;

        // Set cover image
        if (detail.playlistImageUrl) {
          coverImage.src = detail.playlistImageUrl;
          coverImage.alt = detail.title || detail.name;
        } else {
          coverImage.src = 'https://images.unsplash.com/photo-1493225457124-a3eb161ffa5f?auto=format&fit=crop&w=800&q=84';
          coverImage.alt = '默认封面';
        }

        // Load audio
        if (detail.hasOutput) {
          const audioUrl = getWorkspaceFileUrl(showName, 'output', 'program.mp3');
          audioPlayer.src = audioUrl;

          // Load subtitles
          try {
            const srtUrl = getWorkspaceFileUrl(showName, 'output', 'program.srt');
            const srtResponse = await fetch(srtUrl);
            if (srtResponse.ok) {
              const srtText = await srtResponse.text();
              cues = parseSrt(srtText);
            }
          } catch (e) {
            console.warn('Failed to load subtitles:', e);
          }
        }
      } catch (error) {
        console.error('Failed to load show:', error);
        showTitle.innerHTML = 'Error loading show';
      }
    }

    // Play/Pause
    playButton.addEventListener('click', () => {
      if (isPlaying) {
        audioPlayer.pause();
      } else {
        audioPlayer.play();
      }
    });

    audioPlayer.addEventListener('play', () => {
      isPlaying = true;
      playIcon.className = 'pause-icon';
      playButton.setAttribute('aria-label', '暂停');
      programVisual.classList.add('spinning');
    });

    audioPlayer.addEventListener('pause', () => {
      isPlaying = false;
      playIcon.className = 'play-icon';
      playButton.setAttribute('aria-label', '播放');
      programVisual.classList.remove('spinning');
    });

    // Time update
    audioPlayer.addEventListener('timeupdate', () => {
      const { currentTime, duration } = audioPlayer;
      if (!duration) return;

      const progress = (currentTime / duration) * 100;
      progressFill.style.width = `${progress}%`;
      currentTimeEl.textContent = formatTime(currentTime);
      syncSubtitles(currentTime);
    });

    audioPlayer.addEventListener('loadedmetadata', () => {
      durationEl.textContent = formatTime(audioPlayer.duration);
    });

    // Progress bar drag seek
    let isDragging = false;

    function seekToPosition(clientX) {
      const rect = progressBar.getBoundingClientRect();
      const percent = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
      progressFill.style.width = `${percent * 100}%`;
      if (audioPlayer.duration) {
        audioPlayer.currentTime = percent * audioPlayer.duration;
      }
    }

    progressBar.addEventListener('mousedown', (e) => {
      isDragging = true;
      progressBar.classList.add('dragging');
      seekToPosition(e.clientX);
      e.preventDefault();
    });

    document.addEventListener('mousemove', (e) => {
      if (!isDragging) return;
      seekToPosition(e.clientX);
    });

    document.addEventListener('mouseup', () => {
      if (isDragging) {
        isDragging = false;
        progressBar.classList.remove('dragging');
      }
    });

    // Touch support
    progressBar.addEventListener('touchstart', (e) => {
      isDragging = true;
      progressBar.classList.add('dragging');
      seekToPosition(e.touches[0].clientX);
      e.preventDefault();
    }, { passive: false });

    document.addEventListener('touchmove', (e) => {
      if (!isDragging) return;
      seekToPosition(e.touches[0].clientX);
    }, { passive: false });

    document.addEventListener('touchend', () => {
      if (isDragging) {
        isDragging = false;
        progressBar.classList.remove('dragging');
      }
    });

    // Update live time
    function updateLiveTime() {
      if (isPlaying) {
        const mins = Math.floor(audioPlayer.currentTime / 60);
        const secs = Math.floor(audioPlayer.currentTime % 60);
        liveTime.textContent = `On Air · ${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
      }
      requestAnimationFrame(updateLiveTime);
    }

    // Keyboard shortcuts
    const SEEK_STEP = 5;  // seconds
    const VOLUME_STEP = 0.1;

    document.addEventListener('keydown', (e) => {
      // Ignore if user is typing in an input
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;

      switch (e.key) {
        case ' ':
        case 'k':
          e.preventDefault();
          if (isPlaying) {
            audioPlayer.pause();
          } else {
            audioPlayer.play();
          }
          break;

        case 'ArrowLeft':
          e.preventDefault();
          audioPlayer.currentTime = Math.max(0, audioPlayer.currentTime - SEEK_STEP);
          break;

        case 'ArrowRight':
          e.preventDefault();
          audioPlayer.currentTime = Math.min(audioPlayer.duration, audioPlayer.currentTime + SEEK_STEP);
          break;

        case 'ArrowUp':
          e.preventDefault();
          audioPlayer.volume = Math.min(1, audioPlayer.volume + VOLUME_STEP);
          break;

        case 'ArrowDown':
          e.preventDefault();
          audioPlayer.volume = Math.max(0, audioPlayer.volume - VOLUME_STEP);
          break;

        case 'm':
        case 'M':
          e.preventDefault();
          audioPlayer.muted = !audioPlayer.muted;
          break;

        case 'Home':
          e.preventDefault();
          audioPlayer.currentTime = 0;
          break;

        case 'End':
          e.preventDefault();
          audioPlayer.currentTime = audioPlayer.duration;
          break;
      }
    });

    // Initialize
    loadShow();
    updateLiveTime();
  </script>
</body>
</html>
